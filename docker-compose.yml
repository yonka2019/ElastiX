services:
  elastix:
    image: elastix
    container_name: elastix
    ports:
      - "5173:4000"
    restart: unless-stopped
    # Mirror the K8s ConfigMap mount with a host file so Docker and K8s share
    # the same load path. server.js reads /etc/templates/templates.json at
    # startup and inlines it into index.html.
    #
    # Edit ./public/templates.json on the host, then:
    #   docker compose restart elastix
    # to pick up the new catalog (the server inlines at process start).
    volumes:
      - ./public/templates.json:/etc/templates/templates.json:ro
    # Prefer templates from MongoDB instead of the mounted file: set
    # MONGO_URL and the frontend pulls the catalog live from
    # GET /api/templates. The file above stays as the fallback whenever
    # Mongo is unset or unreachable.
    # environment:
    #   MONGO_URL: mongodb://mongo:27017
    #   MONGO_DB: elastix                       # default
    #   MONGO_TEMPLATES_COLLECTION: templates   # default
