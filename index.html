<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>ElastiX</title>
    <!--
      Fonts are intentionally NOT loaded from Google Fonts so this app works
      on fully air-gapped machines. The CSS falls back to system-ui /
      ui-monospace. To restore Inter / JetBrains Mono offline, drop the
      woff2 files into public/fonts/ and add @font-face rules in src/index.css.
    -->
    <!--
      The templates catalog is inlined here at pod startup by docker-entrypoint.sh.
      It substitutes ${ELASTIX_TEMPLATES_JSON} with the contents of the mounted
      ConfigMap (or the bundled fallback). The browser then reads the catalog
      from this element — no separate HTTP request for templates.
      In `npm run dev`, the placeholder stays literal; the store falls back to
      fetching /templates.json from Vite's public/ folder.
    -->
    <script id="elastix-templates" type="application/json">${ELASTIX_TEMPLATES_JSON}</script>
    <script>
      (function () {
        try {
          var v = localStorage.getItem('elastix-theme');
          var dark = v ? v === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.classList.add('dark');
          var tint = localStorage.getItem(dark ? 'elastix-tint-dark' : 'elastix-tint-light');
          if (tint && tint !== 'classic') document.documentElement.setAttribute('data-tint', tint);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
