name: Build Docker on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Docker image and export to tar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: myapp:${{ steps.tag.outputs.tag }}
          outputs: type=docker,dest=/tmp/elastix-${{ steps.tag.outputs.tag }}.tar

      - name: Upload Docker image as artifact
        uses: actions/upload-artifact@v4
        with:
          name:  elastix-${{ steps.tag.outputs.tag }}
          path: /tmp/elastix-${{ steps.tag.outputs.tag }}.tar
          retention-days: 30

      - name: Create GitHub Release with image
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/elastix-${{ steps.tag.outputs.tag }}.tar
          name: Release ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}


      - name: Configure AWS credentials via keys
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1


      - name: Upload Docker image to S3
        env:
          AWS_ENDPOINT_URL_S3: ${{ secrets.S3_ENDPOINT_URL }}
        run: |
          aws s3 cp /tmp/elastix-${{ steps.tag.outputs.tag }}.tar.gz \
            s3://packages/elastix/elastix-${{ steps.tag.outputs.tag }}.tar.gz \
            --metadata "tag=${{ steps.tag.outputs.tag }},commit=${{ github.sha }}"
